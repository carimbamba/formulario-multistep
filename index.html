<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro Inteligente — Formulário Multi-Step</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap"
    rel="stylesheet"
  />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="page-wrap">

    <!-- ── Cabeçalho da página ──────────────────────────────── -->
    <header class="page-header" aria-label="Cabeçalho">
      <h1>Cadastro <em>Inteligente</em></h1>
      <p>Preencha as etapas abaixo para continuar</p>
    </header>

    <!-- ── Card principal do formulário ────────────────────── -->
    <main class="form-card" role="main">

      <!-- Indicador de progresso -->
      <div class="progress-header" aria-live="polite" aria-atomic="true">
        <span class="progress-label">
          Etapa <strong id="current-step-label">1</strong> de <strong>4</strong>
        </span>

        <div
          class="progress-track"
          role="progressbar"
          aria-valuemin="1"
          aria-valuemax="4"
          aria-valuenow="1"
          aria-label="Progresso do formulário"
        >
          <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="step-dots" aria-hidden="true">
          <span class="step-dot active" data-step="1"></span>
          <span class="step-dot"        data-step="2"></span>
          <span class="step-dot"        data-step="3"></span>
          <span class="step-dot"        data-step="4"></span>
        </div>
      </div>

      <!-- ── Viewport que contém todas as etapas ─────────── -->
      <div class="steps-viewport" id="steps-viewport">

        <!-- ════ ETAPA 1 — Identificação ════════════════════ -->
        <section
          class="step active"
          id="step-1"
          data-step="1"
          aria-label="Etapa 1: Identificação"
        >
          <h2 class="step-title" data-num="01">Identificação</h2>

          <div class="field-row">
            <div class="field">
              <label for="nome">Nome *</label>
              <input
                type="text" id="nome" name="nome"
                placeholder="João"
                autocomplete="given-name"
                data-validate="required|minlength:2"
              />
              <span class="field-error" id="nome-error" role="alert" aria-live="polite"></span>
            </div>

            <div class="field">
              <label for="sobrenome">Sobrenome *</label>
              <input
                type="text" id="sobrenome" name="sobrenome"
                placeholder="Silva"
                autocomplete="family-name"
                data-validate="required|minlength:2"
              />
              <span class="field-error" id="sobrenome-error" role="alert" aria-live="polite"></span>
            </div>
          </div>

          <div class="field">
            <label for="email">E-mail *</label>
            <input
              type="email" id="email" name="email"
              placeholder="joao@exemplo.com"
              autocomplete="email"
              data-validate="required|email"
            />
            <span class="field-error" id="email-error" role="alert" aria-live="polite"></span>
          </div>

          <div class="field">
            <label for="telefone">Telefone *</label>
            <input
              type="tel" id="telefone" name="telefone"
              placeholder="(85) 99999-0000"
              autocomplete="tel"
              maxlength="15"
              data-validate="required|phone"
              data-mask="phone"
            />
            <span class="field-error" id="telefone-error" role="alert" aria-live="polite"></span>
          </div>

          <nav class="nav-row" aria-label="Navegação etapa 1">
            <button type="button" class="btn btn-next" data-next="2">
              Próximo &rarr;
            </button>
          </nav>
        </section>

        <!-- ════ ETAPA 2 — Endereço ══════════════════════════ -->
        <section
          class="step"
          id="step-2"
          data-step="2"
          aria-label="Etapa 2: Endereço"
          hidden
        >
          <h2 class="step-title" data-num="02">Endereço</h2>

          <div class="field-row">
            <div class="field">
              <label for="cep">CEP *</label>
              <input
                type="text" id="cep" name="cep"
                placeholder="60000-000"
                maxlength="9"
                data-validate="required|cep"
                data-mask="cep"
              />
              <span class="field-error" id="cep-error" role="alert" aria-live="polite"></span>
            </div>

            <div class="field">
              <label for="estado">Estado *</label>
              <select id="estado" name="estado" data-validate="required">
                <option value="">— Selecione —</option>
                <option>AC</option><option>AL</option><option>AM</option>
                <option>AP</option><option>BA</option><option>CE</option>
                <option>DF</option><option>ES</option><option>GO</option>
                <option>MA</option><option>MG</option><option>MS</option>
                <option>MT</option><option>PA</option><option>PB</option>
                <option>PE</option><option>PI</option><option>PR</option>
                <option>RJ</option><option>RN</option><option>RO</option>
                <option>RR</option><option>RS</option><option>SC</option>
                <option>SE</option><option>SP</option><option>TO</option>
              </select>
              <span class="field-error" id="estado-error" role="alert" aria-live="polite"></span>
            </div>
          </div>

          <div class="field">
            <label for="cidade">Cidade *</label>
            <input
              type="text" id="cidade" name="cidade"
              placeholder="Fortaleza"
              data-validate="required|minlength:2"
            />
            <span class="field-error" id="cidade-error" role="alert" aria-live="polite"></span>
          </div>

          <div class="field">
            <label for="logradouro">Rua / Logradouro *</label>
            <input
              type="text" id="logradouro" name="logradouro"
              placeholder="Av. Beira Mar, 100"
              data-validate="required|minlength:5"
            />
            <span class="field-error" id="logradouro-error" role="alert" aria-live="polite"></span>
          </div>

          <nav class="nav-row" aria-label="Navegação etapa 2">
            <button type="button" class="btn btn-back" data-prev="1">&larr; Voltar</button>
            <button type="button" class="btn btn-next" data-next="3">Próximo &rarr;</button>
          </nav>
        </section>

        <!-- ════ ETAPA 3 — Preferências ══════════════════════ -->
        <section
          class="step"
          id="step-3"
          data-step="3"
          aria-label="Etapa 3: Preferências"
          hidden
        >
          <h2 class="step-title" data-num="03">Preferências</h2>

          <div class="field">
            <label>Área de interesse *</label>
            <div class="options-group" id="interesse-group" role="group" aria-label="Área de interesse">
              <div class="option-pill">
                <input type="radio" name="interesse" id="int-tech"     value="Tecnologia" />
                <label for="int-tech">Tecnologia</label>
              </div>
              <div class="option-pill">
                <input type="radio" name="interesse" id="int-design"   value="Design" />
                <label for="int-design">Design</label>
              </div>
              <div class="option-pill">
                <input type="radio" name="interesse" id="int-negocios" value="Negócios" />
                <label for="int-negocios">Negócios</label>
              </div>
              <div class="option-pill">
                <input type="radio" name="interesse" id="int-ciencias" value="Ciências" />
                <label for="int-ciencias">Ciências</label>
              </div>
              <div class="option-pill">
                <input type="radio" name="interesse" id="int-outros"   value="Outros" />
                <label for="int-outros">Outros</label>
              </div>
            </div>
            <span class="field-error" id="interesse-error" role="alert" aria-live="polite"></span>
          </div>

          <div class="field">
            <label>Notificações *</label>
            <div class="options-group" role="group" aria-label="Preferências de notificação">
              <div class="option-pill">
                <input type="checkbox" name="notif" id="notif-email" value="E-mail" />
                <label for="notif-email">E-mail</label>
              </div>
              <div class="option-pill">
                <input type="checkbox" name="notif" id="notif-sms"   value="SMS" />
                <label for="notif-sms">SMS</label>
              </div>
              <div class="option-pill">
                <input type="checkbox" name="notif" id="notif-push"  value="Push" />
                <label for="notif-push">Push</label>
              </div>
            </div>
            <span class="field-error" id="notif-error" role="alert" aria-live="polite"></span>
          </div>

          <div class="field">
            <label for="nivel">Nível de experiência *</label>
            <select id="nivel" name="nivel" data-validate="required">
              <option value="">— Selecione —</option>
              <option value="iniciante">Iniciante</option>
              <option value="intermediario">Intermediário</option>
              <option value="avancado">Avançado</option>
              <option value="especialista">Especialista</option>
            </select>
            <span class="field-error" id="nivel-error" role="alert" aria-live="polite"></span>
          </div>

          <nav class="nav-row" aria-label="Navegação etapa 3">
            <button type="button" class="btn btn-back" data-prev="2">&larr; Voltar</button>
            <button type="button" class="btn btn-next" data-next="4">Próximo &rarr;</button>
          </nav>
        </section>

        <!-- ════ ETAPA 4 — Revisão & Finalização ════════════ -->
        <section
          class="step"
          id="step-4"
          data-step="4"
          aria-label="Etapa 4: Revisão e finalização"
          hidden
        >
          <h2 class="step-title" data-num="04">Revisão</h2>

          <div class="field">
            <label for="comentarios">Comentários adicionais</label>
            <textarea
              id="comentarios" name="comentarios"
              placeholder="Alguma observação? (opcional)"
            ></textarea>
          </div>

          <div class="field">
            <label>Como nos encontrou? *</label>
            <div class="options-group" role="group" aria-label="Como nos encontrou">
              <div class="option-pill">
                <input type="radio" name="origem" id="orig-busca"  value="Busca online" />
                <label for="orig-busca">Busca online</label>
              </div>
              <div class="option-pill">
                <input type="radio" name="origem" id="orig-social" value="Redes sociais" />
                <label for="orig-social">Redes sociais</label>
              </div>
              <div class="option-pill">
                <input type="radio" name="origem" id="orig-amigo"  value="Indicação" />
                <label for="orig-amigo">Indicação</label>
              </div>
              <div class="option-pill">
                <input type="radio" name="origem" id="orig-outro"  value="Outro" />
                <label for="orig-outro">Outro</label>
              </div>
            </div>
            <span class="field-error" id="origem-error" role="alert" aria-live="polite"></span>
          </div>

          <nav class="nav-row" aria-label="Navegação etapa 4">
            <button type="button" class="btn btn-back"   data-prev="3">&larr; Voltar</button>
            <button type="button" class="btn btn-submit" id="btn-submit">Enviar ✓</button>
          </nav>
        </section>

      </div><!-- /steps-viewport -->

      <!-- ── Tela de sucesso ─────────────────────────────── -->
      <div
        id="success-screen"
        aria-live="assertive"
        aria-label="Formulário enviado com sucesso"
      >
        <div class="success-icon" aria-hidden="true">
          <!-- Ícone check SVG inline — único caso justificado (SVG semântico, sem arquivo externo) -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h2>Tudo certo!</h2>
        <p>Seu cadastro foi recebido com sucesso.</p>
        <dl class="summary-list" id="summary-list"></dl>
      </div>

    </main><!-- /form-card -->

    <!-- ── Rodapé ──────────────────────────────────────────── -->
    <footer class="page-footer" aria-label="Rodapé">
      Formulário Multi-Step &mdash; Vanilla JS &middot; Sem dependências externas
    </footer>

  </div><!-- /page-wrap -->

  <!--
    Scripts carregados no final do <body> para não bloquear o parser HTML.
    Ordem importa: dependências primeiro, orquestrador por último.
  -->
  <script src="js/validators.js"></script>
  <script src="js/masks.js"></script>
  <script src="js/wizard.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
